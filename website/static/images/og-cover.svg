  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b7285"/>
      <stop offset="55%" stop-color="#2a9d8f"/>
      <stop offset="100%" stop-color="#f4a261"/>
